name: Sync Upstream Release

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Cheap, no-checkout check that runs every schedule tick. Only network calls to look at tag
  # names -- no full clone, no submodules. The expensive sync job below only runs at all if
  # this finds something new, instead of checking out the whole repo just to bail out.
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.latest.outputs.tag }}
      should_run: ${{ steps.check.outputs.should_run }}

    steps:
      - name: Determine latest upstream release tag
        id: latest
        run: |
          # Dolphin tags real releases as YYMM, optionally with a letter suffix for point
          # releases (e.g. 2606, 2603a). This intentionally excludes dev-build numbers, which
          # aren't tags at all, and one-off historical tags like "nJoy". Sorted numerically by
          # (YYMM, suffix) rather than plain lexical sort, since "2606a" > "2607" as raw text.
          LATEST_TAG=$(git ls-remote --tags https://github.com/dolphin-emu/dolphin.git \
            | awk '{print $2}' | sed 's#refs/tags/##; s/\^{}$//' | sort -u \
            | python3 -c "import sys,re; tags=[l.strip() for l in sys.stdin if re.fullmatch(r'[0-9]{4}[a-z]?',l.strip())]; tags.sort(key=lambda t:(int(re.match(r'([0-9]{4})([a-z]?)',t).group(1)),re.match(r'([0-9]{4})([a-z]?)',t).group(2))); print(tags[-1] if tags else '')")
          if [ -z "$LATEST_TAG" ]; then
            echo "No matching release tag found on upstream"
            exit 1
          fi
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Latest upstream release tag: $LATEST_TAG"

      - name: Check if already synced
        id: check
        run: |
          if git ls-remote --exit-code --tags "https://github.com/${{ github.repository }}.git" \
              "refs/tags/sync/${{ steps.latest.outputs.tag }}" >/dev/null 2>&1; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "${{ steps.latest.outputs.tag }} already synced, nothing to do"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.latest.outputs.tag }} is new, running full sync"
          fi

  sync:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          submodules: recursive

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream tags
        run: |
          git remote add upstream https://github.com/dolphin-emu/dolphin.git
          git fetch upstream --tags --quiet

      # release-sync is rebuilt from the tip of master on every run, so
      # this automation never pushes to (or conflicts with) the branch used for manual testing.
      - name: Create release-sync branch from latest feature work
        run: git checkout -B release-sync master

      - name: Merge upstream release tag
        id: merge
        run: |
          set +e
          git merge "${{ needs.check.outputs.tag }}" --no-edit -m "Merge upstream release ${{ needs.check.outputs.tag }}"
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            git merge --abort || true
            echo "conflict=true" >> "$GITHUB_OUTPUT"
          else
            echo "conflict=false" >> "$GITHUB_OUTPUT"
          fi

      # No GitHub Issue is filed here (Issues are disabled on this repo) -- failing the job
      # outright is enough. GitHub automatically emails repo admins when a *scheduled* workflow
      # run fails, and the run shows up red in the Actions tab either way.
      - name: Report merge conflict
        if: steps.merge.outputs.conflict == 'true'
        run: |
          echo "Automatic merge of upstream tag '${{ needs.check.outputs.tag }}' into release-sync (based on master) produced conflicts."
          echo "Resolve manually:"
          echo "  git fetch upstream --tags"
          echo "  git checkout -B release-sync master"
          echo "  git merge ${{ needs.check.outputs.tag }}"
          exit 1

      - name: Update submodules
        if: steps.merge.outputs.conflict == 'false'
        run: git submodule update --init --recursive

      - name: Push release-sync branch
        if: steps.merge.outputs.conflict == 'false'
        run: git push origin release-sync --force

      - name: Set up JDK 17
        if: steps.merge.outputs.conflict == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        if: steps.merge.outputs.conflict == 'false'
        uses: android-actions/setup-android@v3

      - name: Install NDK
        if: steps.merge.outputs.conflict == 'false'
        run: sdkmanager "ndk;29.0.14206865"

      - name: Cache CMake build output
        if: steps.merge.outputs.conflict == 'false'
        uses: actions/cache@v4
        with:
          path: Source/Android/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'Source/Core/**/*.cpp', 'Source/Core/**/*.h') }}
          restore-keys: cxx-${{ runner.os }}-

      - name: Decode release keystore
        if: steps.merge.outputs.conflict == 'false'
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/dolphincs-release.jks"

      - name: Build release APK
        if: steps.merge.outputs.conflict == 'false'
        working-directory: Source/Android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pkeystore="$RUNNER_TEMP/dolphincs-release.jks" \
            -Pstorepass="${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" \
            -Pkeyalias="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -Pkeypass="${{ secrets.RELEASE_KEY_PASSWORD }}"
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/dolphincs-release.jks"

      - name: Publish release
        if: steps.merge.outputs.conflict == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "dolphin-${{ needs.check.outputs.tag }}"
          name: "Dolphin ${{ needs.check.outputs.tag }} + Custom Storage Location"
          target_commitish: release-sync
          prerelease: false
          make_latest: true
          files: Source/Android/app/build/outputs/apk/release/app-release.apk
          body: |
            Built from upstream Dolphin release `${{ needs.check.outputs.tag }}`, merged with the
            custom user data storage location feature (Scoped Storage / Internal Storage / SD Card).

            This is an unofficial community build, not affiliated with the Dolphin team.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag sync marker
        if: steps.merge.outputs.conflict == 'false'
        run: |
          git tag "sync/${{ needs.check.outputs.tag }}"
          git push origin "sync/${{ needs.check.outputs.tag }}"
