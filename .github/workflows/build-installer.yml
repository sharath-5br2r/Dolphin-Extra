name: Build Better Wii Menu DE Installer

on:
  push:
    branches: [better-wii-menu-de]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup NSIS
        run: choco install nsis -y

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DDISTRIBUTOR="Better Wii Menu DE" `
            -DENABLE_AUTOUPDATE=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Prepare installer files
        run: |
          $buildOut = "build/Binaries/Release"
          $installerBin = "Binary/x64"
          New-Item -ItemType Directory -Force -Path $installerBin
          Copy-Item -Recurse -Force "$buildOut/*" "$installerBin/"

      - name: Build NSIS installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DDOLPHIN_ARCH=x64 /DPRODUCT_VERSION=${{ github.sha }} Source/Installer/Installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: BetterWiiMenuDE-x64-installer
          path: Source/Installer/BetterWiiMenuDE-*.exe

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: BetterWiiMenuDE-x64-portable
          path: build/Binaries/Release/
