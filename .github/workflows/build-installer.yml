name: Build Better Wii Menu DE Installer

on:
  push:
    branches: [better-wii-menu-de]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup NSIS
        run: choco install nsis -y

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DDISTRIBUTOR="Better Wii Menu DE" `
            -DENABLE_AUTOUPDATE=OFF `
            -DDISABLE_NLS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Prepare installer files
        run: |
          # Visual Studio multi-config puts output in Binary/x64/Release/
          # Move contents up to Binary/x64/ where the installer expects them
          if (Test-Path "Binary/x64/Release") {
            Write-Host "Moving files from Binary/x64/Release/ to Binary/x64/"
            Copy-Item -Recurse -Force "Binary/x64/Release/*" "Binary/x64/"
            Remove-Item -Recurse -Force "Binary/x64/Release"
          } elseif (!(Test-Path "Binary/x64")) {
            Write-Error "Build output not found in Binary/x64/ or Binary/x64/Release/"
            exit 1
          }
          Write-Host "Installer files ready in Binary/x64/"
          Get-ChildItem "Binary/x64/" | Select-Object -First 20

      - name: Build NSIS installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DDOLPHIN_ARCH=x64 /DPRODUCT_VERSION=${{ github.sha }} Source/Installer/Installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: BetterWiiMenuDE-x64-installer
          path: Source/Installer/BetterWiiMenuDE-*.exe

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: BetterWiiMenuDE-x64-portable
          path: Binary/x64/
